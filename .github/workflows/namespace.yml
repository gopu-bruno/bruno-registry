name: namespace

# Namespace / source-owner match. On a PR touching collection/**, each changed
# entry's namespace owner must equal the owner of every version's source.url
# (github:acme must source from github.com/acme/…). PR-scoped: existing entries
# are grandfathered; build-index.mjs still enforces path-identity tree-wide.
on:
  pull_request:
    paths:
      - 'collection/**'

permissions:
  contents: read

jobs:
  namespace-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Collect changed collection files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --name-only "$BASE_SHA" HEAD -- 'collection/**/*.json' > changed.txt || true
      - name: Verify namespace matches source owner
        env:
          FILES_FILE: changed.txt
        run: node scripts/check-namespace-source.mjs
