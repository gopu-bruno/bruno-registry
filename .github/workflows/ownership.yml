name: ownership

# Namespace ownership gate. On a PR touching collection/**, confirm the PR author
# controls each changed github:<owner> namespace (their login, or a public org
# member). Maintainers bypass by labelling the PR `ownership-approved`.
on:
  pull_request:
    paths:
      - 'collection/**'

permissions:
  contents: read

jobs:
  ownership:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ownership-approved') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Collect changed collection files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --name-only "$BASE_SHA" HEAD -- 'collection/**/*.json' > changed.txt || true
      - name: Verify namespace ownership
        env:
          ACTOR: ${{ github.event.pull_request.user.login }}
          FILES_FILE: changed.txt
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-ownership.mjs
